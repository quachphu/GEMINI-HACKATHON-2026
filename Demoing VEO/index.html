<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraDirector | Cinematic High-Reliability Pipeline</title>
    <link href='https://fonts.googleapis.com/css?family=Lato:300,400,700' rel='stylesheet' type='text/css'>
    <style>
        :root {
            --accent-gold: #c5a059;
            --font-serif: "Playfair Display", serif;
            --lato: 'Lato', sans-serif;
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 400vh; /* Massive scroll depth for cinematic feel */
            width: 100%;
            overflow-x: hidden;
            font-family: var(--lato);
            color: #FFF;
            background: #090a0f;
            scroll-behavior: smooth;
        }

        #stars_container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .stars {
            position: absolute;
            top: 0;
            left: 0;
            background: transparent;
        }

        #stars { width: 1px; height: 1px; animation: animStar 50s linear infinite; }
        #stars2 { width: 2px; height: 2px; animation: animStar 100s linear infinite; }
        #stars3 { width: 3px; height: 3px; animation: animStar 150s linear infinite; }

        @keyframes animStar {
            from { transform: translateY(0px); }
            to { transform: translateY(-2000px); }
        }

        /* HORIZON & EARTH */
        #horizon {
            position: fixed;
            width: 160%;
            height: 70%;
            border-radius: 100% / 100%;
            background: #038bff;
            filter: blur(30px);
            left: 50%;
            bottom: -20%;
            margin-left: -80%;
            transition: transform 1s cubic-bezier(0.19, 1, 0.22, 1);
        }

        #horizon:before {
            content: "";
            position: absolute;
            width: 81.25%;
            height: 70%;
            border-radius: 100%;
            background: #51AFFF;
            filter: blur(30px);
            opacity: 0.6;
            margin-left: 9.375%;
        }

        #earth {
            position: fixed;
            width: 200%;
            height: 100%;
            background: black;
            border-radius: 100% / 100%;
            left: 50%;
            bottom: -50%;
            margin-left: -100%;
            box-shadow: inset 0px 0px 62px 20px rgba(60,105,138,0.85);
            transition: transform 1.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* TEXT CONTENT */
        #hero_content {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 10;
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        #title {
            font-weight: 300;
            font-size: clamp(3.5rem, 12vw, 10rem);
            text-align: center;
            letter-spacing: 35px;
            margin: 0;
            padding-left: 35px; /* Offset for letter spacing */
            background: linear-gradient(#fff, #dbdde0, #4a90e2);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            animation: animEntrance 3s ease-out forwards;
        }

        #subtitle {
            margin-top: 3rem;
            font-weight: 300;
            font-size: 1.1rem;
            text-align: center;
            letter-spacing: 18px;
            text-transform: uppercase;
            padding-left: 18px;
            color: rgba(255, 255, 255, 0.6);
            animation: animEntranceSub 4s ease-out forwards;
        }

        @keyframes animEntrance {
            0% { transform: translateY(20px); opacity: 0; letter-spacing: 50px; }
            100% { transform: translateY(0); opacity: 1; letter-spacing: 35px; }
        }

        @keyframes animEntranceSub {
            0% { opacity: 0; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* SCROLL TRIGGERED REVEAL */
        #launch_area {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -40%) scale(0.9);
            opacity: 0;
            visibility: hidden; /* Hard hide to prevent initial flicker */
            pointer-events: none;
            transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1);
            text-align: center;
            z-index: 100;
        }

        #launch_area.active {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: auto;
        }

        .launch-btn {
            background: transparent;
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            padding: 1.5rem 4rem;
            font-size: 1.2rem;
            letter-spacing: 0.5rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(197, 160, 89, 0.2);
            text-decoration: none;
            display: inline-block;
        }

        .launch-btn:hover {
            background: var(--accent-gold);
            color: black;
            box-shadow: 0 0 50px rgba(197, 160, 89, 0.5);
        }

        .scroll-hint {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            letter-spacing: 0.3rem;
            opacity: 0.5;
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% { opacity: 0.2; } 50% { opacity: 0.6; } 100% { opacity: 0.2; } }

    </style>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="stars_container">
        <div id="stars" class="stars"></div>
        <div id="stars2" class="stars"></div>
        <div id="stars3" class="stars"></div>
    </div>

    <div id="horizon"><div class="glow"></div></div>
    <div id="earth"></div>

    <div id="hero_content">
    <main>
        <div id="ai_awakening" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer;">
            <div class="logo" style="font-size: 3rem; margin-bottom: 2rem;">Aura<span>Director</span></div>
            <div class="awakening-hint" style="color: var(--accent-gold); letter-spacing: 0.5rem; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 1rem;">AI DIRECTOR INITIALIZING...</div>
            <div style="color: rgba(255,255,255,0.3); font-size: 0.6rem; letter-spacing: 0.2rem; text-transform: uppercase;">[SELF-HEALING LISTENERS SYNC V45.49]</div>
        </div>

        <section class="hero">
        <h1 class="hero-title">AuraDirector</h1>
        <div id="subtitle">
            <span class="s1">DIRECT.</span>
            <span class="s2">BEYOND.</span>
            <span class="s3">REALITY.</span>
        </div>
        </section>
    </main>
    </div>

    <div id="launch_area">
        <h2 style="font-weight: 300; letter-spacing: 1rem; color: #fff; margin-bottom: 3rem;">V35 PARALLEL BURST READY</h2>
        <a href="app.html" class="launch-btn">Enter Laboratory</a>
    </div>

    <!-- V45: VOICE DIRECTOR INTERFACE -->
    <div style="position: fixed; top: 2rem; right: 4rem; z-index: 1000; display: flex; align-items: center; gap: 2rem;">
        <div id="liveStatus" class="hidden" style="display: flex; align-items: center; gap: 0.8rem; background: rgba(0, 242, 255, 0.1); padding: 0.8rem 1.5rem; border-radius: 100px; border: 1px solid var(--accent-cyan); color: var(--accent-cyan); font-size: 0.75rem; letter-spacing: 0.1em; font-weight: bold;">
            <div style="width: 8px; height: 8px; background: var(--accent-cyan); border-radius: 50%; box-shadow: 0 0 10px var(--accent-cyan); animation: pulse 1s infinite;"></div>
            LIVE AI: <span id="liveStatusText">LISTENING</span>
        </div>
        <button id="micBtn" class="glass" style="width: 60px; height: 60px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s;">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </button>
    </div>

    <div class="scroll-hint">Scroll down to explore</div>

    <script>
        // Force scroll to top on load/refresh
        window.onbeforeunload = function () { window.scrollTo(0, 0); }
        if ('scrollRestoration' in history) { history.scrollRestoration = 'manual'; }

        // Star generator logic
        function genStars(id, count) {
            const el = document.getElementById(id);
            let shadows = [];
            for (let i = 0; i < count; i++) {
                shadows.push(`${Math.random() * 2000}px ${Math.random() * 2000}px #FFF`);
            }
            el.style.boxShadow = shadows.join(', ');
            
            const style = document.createElement('style');
            style.innerHTML = `#${id}::after { content: " "; position: absolute; top: 2000px; width: inherit; height: inherit; background: transparent; box-shadow: ${shadows.join(', ')}; }`;
            document.head.appendChild(style);
        }

        genStars('stars', 700);
        genStars('stars2', 200);
        genStars('stars3', 100);

        function updateLayout() {
            const scrollPercent = window.scrollY / (document.documentElement.scrollHeight - window.innerHeight);
            
            const horizon = document.getElementById('horizon');
            const earth = document.getElementById('earth');
            const hero = document.getElementById('hero_content');
            const launch = document.getElementById('launch_area');
            const hint = document.querySelector('.scroll-hint');

            // Hero Fades out between 0% and 30% scroll
            hero.style.opacity = Math.max(0, 1 - (scrollPercent * 4));
            
            // Horizon/Earth shift
            horizon.style.transform = `translateY(${-scrollPercent * 400}px) scale(${1 + scrollPercent})`;
            earth.style.transform = `translateY(${-scrollPercent * 150}px)`;

            // Launch reveals after 60%
            if (scrollPercent > 0.6) {
                launch.classList.add('active');
                hint.style.opacity = 0;
            } else {
                launch.classList.remove('active');
                hint.style.opacity = 0.5;
            }
        }

        window.addEventListener('scroll', updateLayout);
        window.addEventListener('load', updateLayout);
        updateLayout(); // Initial call

    </script>
    <script src="aura_director_engine.js?v=45.49"></script>
</body>
</html>
